  # Название workflow
name: e2e playwright

on:
  push:
    branches: [api, main, master]
  pull_request:
    branches: [api, main, master]
  workflow_dispatch:

  #Сами джобы
jobs:
  #название джобы
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      #делаем чекаут кода
      - uses: actions/checkout@v4.2.2
      
      - uses: actions/setup-node@v4.4.0
        with:
         node-version: lts/*
         
      - name: install npm package
        run: npm i
       
      - name: install pw
        run: npx playwright install --with-deps
       
      - name: test
        run: npm run test
#cохраняем отчет pw/allure
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          #или test-result
          name: allure-results #test-result
          #или test-result
          path: allure-results
          retention-days: 3
